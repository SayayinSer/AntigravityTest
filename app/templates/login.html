<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - Antigravity Management</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-4">
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <div class="absolute -top-24 -left-24 w-96 h-96 bg-sky-500/10 rounded-full blur-3xl"></div>
        <div class="absolute -bottom-24 -right-24 w-96 h-96 bg-indigo-500/10 rounded-full blur-3xl"></div>
    </div>

    <div class="w-full max-w-md glass p-8 rounded-[2.5rem] shadow-2xl border border-white/20 relative z-10">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-black tracking-tighter text-slate-900 mb-2">ANTIGRAVITY</h1>
            <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Sistema de Gestión de Órdenes</p>
        </div>

        <div id="error-msg"></div>

        <form hx-post="/login" hx-target="body" hx-push-url="true" class="space-y-6">
            <div>
                <label class="block text-[10px] font-black text-slate-400 uppercase mb-2 tracking-widest pl-2">Usuario</label>
                <input type="text" name="username" required 
                       class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl focus:ring-4 focus:ring-sky-500/20 outline-none transition-all font-bold placeholder:font-normal"
                       placeholder="Ingresa tu ID">
            </div>
            <div>
                <label class="block text-[10px] font-black text-slate-400 uppercase mb-2 tracking-widest pl-2">Contraseña</label>
                <input type="password" name="password" required 
                       class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl focus:ring-4 focus:ring-sky-500/20 outline-none transition-all font-bold placeholder:font-normal"
                       placeholder="••••••••">
            </div>

            <button type="submit" 
                    class="w-full bg-slate-900 text-white p-5 rounded-2xl font-black text-xs uppercase tracking-[0.2em] shadow-xl hover:bg-black hover:-translate-y-1 transition-all active:scale-95">
                Iniciar Sesión
            </button>
        </form>

        <div class="mt-10 pt-6 border-t border-slate-100 text-center">
            <p class="text-[10px] text-slate-400 italic">© 2026 Antigravity Security Engine v2.0</p>
        </div>
    </div>
</body>
</html>
