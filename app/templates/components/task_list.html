<div class="overflow-x-auto">
    <table class="w-full text-left">
        <thead>
            <tr class="text-[10px] font-bold text-gray-400 uppercase tracking-widest border-b">
                <th class="pb-3">Descripción</th>
                <th class="pb-3">Técnico</th>
                <th class="pb-3">Tiempo</th>
                <th class="pb-3">Acciones</th>
            </tr>
        </thead>
        <tbody class="divide-y text-sm">
            {% for task in tasks %}
            <tr class="group hover:bg-slate-50 transition-colors">
                <td class="py-4">{{ task.description }}</td>
                <td class="py-4 font-medium text-slate-600">
                    <div class="flex items-center gap-2">
                        <div class="w-2 h-2 rounded-full bg-green-400"></div>
                        {{ task.technician.name }}
                    </div>
                </td>
                <td class="py-4 font-mono font-bold">{{ task.duration_minutes }} min</td>
                <td class="py-4">
                    <button hx-delete="/task/{{ task.id }}" 
                            hx-confirm="¿Estás seguro de eliminar esta tarea?"
                            hx-target="closest tr" 
                            hx-swap="outerHTML"
                            class="p-1.5 text-gray-300 hover:text-red-600 hover:bg-red-50 rounded-lg transition-all opacity-0 group-hover:opacity-100">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                        </svg>
                    </button>
                </td>
            </tr>
            {% endfor %}
            {% if not tasks %}
            <tr>
                <td colspan="4" class="py-10 text-center text-gray-400 italic">No hay tareas registradas aún.</td>
            </tr>
            {% endif %}
        </tbody>
    </table>
</div>
