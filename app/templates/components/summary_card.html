<div class="bg-slate-900 text-white p-6 rounded-2xl shadow-2xl border-t-4 border-sky-400">
    <h3 class="text-xs font-bold uppercase tracking-widest text-sky-400 mb-4">Resumen de la Orden</h3>
    <div class="space-y-4">
        <!-- Tiempo Total -->
        <div class="flex justify-between items-center text-sm bg-sky-950/30 p-3 rounded-xl border border-sky-900/50">
            <div class="flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-sky-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />

                <span class="text-sky-200">Productividad Total:</span>
            </div>
            <span class="font-mono font-black text-sky-400 text-lg">{{ total_duration }}</span>
        </div>

        <div class="space-y-3 px-1">
            <div class="flex justify-between items-center text-xs">
                <span class="text-slate-400">Total Materiales:</span>
                <span class="font-mono font-bold text-slate-300">${{ total_parts }}</span>
            </div>
            <div class="flex justify-between items-center text-xs">
                <span class="text-slate-400">Total Tercerizados:</span>
                <span class="font-mono font-bold text-slate-300">${{ total_third }}</span>
            </div>
        </div>

        <div class="pt-4 mt-4 border-t border-slate-700 flex justify-between items-center">
            <span class="text-lg font-bold">Inversión Final:</span>
            <span class="text-2xl font-black text-sky-400 font-mono">${{ total_general }}</span>
        </div>
    </div>
