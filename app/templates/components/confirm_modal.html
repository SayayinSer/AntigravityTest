<div x-data="{ open: false, title: '', message: '', action: '', target: '', values: {} }" 
     @confirm.window="open = true; title = $event.detail.title; message = $event.detail.message; action = $event.detail.action; target = $event.detail.target; values = $event.detail.values || {}"
     class="relative z-[100]" x-show="open" style="display: none;">
    
    <div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm transition-opacity"></div>

    <div class="fixed inset-0 z-10 overflow-y-auto">
        <div class="flex min-h-full items-end justify-center p-4 text-center sm:items-center sm:p-0">
            <div class="relative transform overflow-hidden rounded-2xl bg-white text-left shadow-2xl transition-all sm:my-8 sm:w-full sm:max-w-lg border border-slate-200"
                 @click.away="open = false"
                 x-transition:enter="ease-out duration-300"
                 x-transition:enter-start="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
                 x-transition:enter-end="opacity-100 translate-y-0 sm:scale-100"
                 x-transition:leave="ease-in duration-200"
                 x-transition:leave-start="opacity-100 translate-y-0 sm:scale-100"
                 x-transition:leave-end="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95">
                
                <div class="bg-white px-4 pb-4 pt-5 sm:p-6 sm:pb-4">
                    <div class="sm:flex sm:items-start">
                        <div class="mx-auto flex h-12 w-12 flex-shrink-0 items-center justify-center rounded-full bg-amber-100 sm:mx-0 sm:h-10 sm:w-10">
                            <svg class="h-6 w-6 text-amber-600" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z" />
                            </svg>
                        </div>
                        <div class="mt-3 text-center sm:ml-4 sm:mt-0 sm:text-left">
                            <h3 class="text-lg font-bold leading-6 text-slate-900" x-text="title">Confirmar Acción</h3>
                            <div class="mt-2 text-sm text-slate-500" x-text="message"></div>
                        </div>
                    </div>
                </div>
                
                <div class="bg-slate-50 px-4 py-3 sm:flex sm:flex-row-reverse sm:px-6 gap-2">
                    <button type="button" 
                            class="inline-flex w-full justify-center rounded-xl bg-sky-600 px-4 py-2.5 text-sm font-bold text-white shadow-sm hover:bg-sky-700 sm:w-auto transition-all"
                            @click="htmx.ajax('POST', action, { target: target, values: values }); open = false"
                            x-show="action.includes('status')">
                        Confirmar Cambio
                    </button>
                    <button type="button" 
                            class="inline-flex w-full justify-center rounded-xl bg-red-600 px-4 py-2.5 text-sm font-bold text-white shadow-sm hover:bg-red-700 sm:w-auto transition-all"
                            @click="htmx.ajax('DELETE', action, { target: target }); open = false"
                            x-show="action.includes('delete') || action.includes('/order/') || action.includes('/brand/') || action.includes('/type/') || action.includes('/tech/') || action.includes('/task/') || action.includes('/part/') || action.includes('/third-party/')">
                        Proceder con Eliminación
                    </button>
                    <button type="button" 
                            class="mt-3 inline-flex w-full justify-center rounded-xl bg-white px-4 py-2.5 text-sm font-bold text-slate-700 shadow-sm ring-1 ring-inset ring-slate-300 hover:bg-slate-50 sm:mt-0 sm:w-auto transition-all"
                            @click="open = false">
                        Cancelar
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
