<!-- Modal de Nuevo Turno -->
<div x-show="showModal" x-cloak class="fixed inset-0 z-[100] flex items-center justify-center p-4">
    <!-- Backdrop -->
    <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" @click="showModal = false" x-transition.opacity></div>

    <!-- Panel -->
    <div class="bg-white rounded-[2rem] shadow-2xl relative w-full max-w-2xl overflow-hidden" 
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 scale-95 translate-y-8"
         x-transition:enter-end="opacity-100 scale-100 translate-y-0">
        
        <div class="bg-sky-600 text-white p-6 flex justify-between items-center">
            <h2 class="text-xl font-black flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                Agendar Nuevo Turno
            </h2>
            <button @click="showModal = false" class="text-sky-200 hover:text-white transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
            </button>
        </div>

        <!-- El x-data anidado controla si el cliente es cargado o nuevo -->
        <form hx-post="{{ base }}/appointments/save" class="p-8 space-y-6" x-data="{ autoFilled: false }">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Información del Cliente -->
                <div class="space-y-4">
                    <h3 class="text-[10px] font-black text-sky-500 uppercase tracking-widest border-b pb-2">Información de Contacto</h3>
                    
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">Correo Electrónico (Búsqueda Automática)</label>
                        <input type="email" name="client_email" id="client_email" required 
                               hx-get="{{ base }}/appointments/api/check-client"
                               hx-trigger="blur changed delay:500ms"
                               hx-target="#autofiller"
                               class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-sky-500 outline-none transition-all">
                        <div id="autofiller" class="hidden"></div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="col-span-2">
                            <label class="block text-xs font-bold text-slate-500 mb-1">Nombre Completo</label>
                            <input type="text" name="client_name" id="client_name" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-sky-500 outline-none transition-all">
                        </div>
                        <div class="col-span-2">
                            <label class="block text-xs font-bold text-slate-500 mb-1">Celular / Teléfono</label>
                            <input type="text" name="client_phone" id="client_phone" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-sky-500 outline-none transition-all">
                        </div>
                    </div>
                </div>

                <!-- Detalle del Turno -->
                <div class="space-y-4">
                    <h3 class="text-[10px] font-black text-sky-500 uppercase tracking-widest border-b pb-2">Datos del Turno</h3>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-1">Fecha</label>
                            <input type="date" name="scheduled_date" required min="{{ today_date }}" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-sky-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-1">Hora</label>
                            <input type="time" name="scheduled_time" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-sky-500 outline-none">
                        </div>
                    </div>

                    <div class="bg-slate-50 p-4 rounded-xl border border-slate-100" x-data="{ linkType: 'existente' }">
                        <div class="flex gap-4 mb-3">
                            <label class="text-xs font-bold flex items-center gap-1 cursor-pointer">
                                <input type="radio" x-model="linkType" value="existente" class="text-sky-600"> Pre-registrado
                            </label>
                            <label class="text-xs font-bold flex items-center gap-1 cursor-pointer">
                                <input type="radio" x-model="linkType" value="nuevo" class="text-sky-600"> Visitante/Nuevo
                            </label>
                        </div>
                        
                        <div x-show="linkType === 'existente'">
                            <select name="vehicle_id" class="w-full p-3 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-sky-500 outline-none text-sm">
                                <option value="">Seleccione un móvil vigente...</option>
                                {% for v in vehicles %}
                                <option value="{{ v.id }}">{{ v.plate }} - {{ v.brand.name }} {{ v.model }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div x-show="linkType === 'nuevo'" x-cloak>
                            <input type="text" name="plate" placeholder="Ej: AA123ZZ" class="w-full p-3 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-sky-500 outline-none text-sm font-mono uppercase">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Motivo -->
            <div>
                <label class="block text-xs font-bold text-slate-500 mb-1">Motivo de Ingreso / Tareas Solicitadas</label>
                <textarea name="reason" rows="2" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-sky-500 outline-none resize-none"></textarea>
            </div>

            <div class="flex justify-end gap-3 pt-4 border-t border-slate-100">
                <button type="button" @click="showModal = false" class="px-6 py-2 text-slate-500 font-bold hover:bg-slate-100 rounded-xl transition-colors">Cancelar</button>
                <button type="submit" class="bg-sky-600 text-white px-8 py-2 rounded-xl font-black shadow-lg shadow-sky-200 hover:bg-sky-700 transition-all active:scale-95">AGENDAR</button>
            </div>
        </form>

    </div>
</div>

<!-- Lógica inyectada al vuelo por HTMX cuando el Email devuelve resultado -->
<script>
    document.body.addEventListener('htmx:afterRequest', function(evt) {
        if (evt.detail.elt.id === 'client_email') {
            try {
                const response = JSON.parse(evt.detail.xhr.response);
                if (response.found) {
                    document.getElementById('client_name').value = response.name;
                    document.getElementById('client_phone').value = response.phone;
                    // Animación visual de éxito
                    document.getElementById('client_name').classList.add('bg-sky-50', 'border-sky-300');
                    setTimeout(() => { document.getElementById('client_name').classList.remove('bg-sky-50', 'border-sky-300'); }, 1000);
                }
            } catch (e) {}
        }
    });
</script>
