<nav class="bg-sky-600 text-white p-4 shadow-lg flex justify-between items-center transition-colors"
     :class="state === 'Terminada' ? 'bg-slate-700' : (state === 'Anulada' ? 'bg-red-700' : 'bg-sky-600')">
    <div class="flex items-center gap-4">
        <h1 class="text-xl font-bold">Detalle de OT #{{ order.id }}</h1>
        <span class="px-2 py-0.5 bg-white/20 rounded text-xs uppercase tracking-widest">{{ order.vehicle.plate }}</span>
    </div>
    <div class="flex gap-3">
        {% if order.status == 'Pendiente' %}
        <button @click="$dispatch('confirm', { 
                    title: '¿Eliminar Orden?', 
                    message: 'Esta acción borrará físicamente la orden y todos sus registros asociados.',
                    action: '/order/{{ order.id }}/delete',
                    target: 'body'
                })"
                class="px-4 py-2 bg-red-600 rounded-lg hover:bg-red-700 text-white text-sm font-bold shadow-md transition-transform active:scale-95">
            Eliminar Orden
        </button>
        {% endif %}
        <a href="/" class="px-4 py-2 bg-white/10 hover:bg-white/20 rounded-lg text-white text-sm font-bold border border-white/20">Volver al Dashboard</a>
    </div>
</nav>
