<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entorno01 - Gestor de Datos</title>
    <!-- Google Fonts para tipografía premium -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="logo">
                <div class="logo-icon"></div>
                <h1>Entorno01</h1>
            </div>
            <p class="subtitle">Gestión de base de datos eficiente</p>
        </header>

        <main class="main-content">
            <section class="form-section panel">
                <h2>Añadir Nuevo Objeto</h2>
                <form id="item-form">
                    <div class="input-group">
                        <label for="name">Nombre</label>
                        <input type="text" id="name" placeholder="Ej. Servidor DB" required>
                    </div>
                    
                    <div class="input-group">
                        <label for="description">Descripción</label>
                        <textarea id="description" placeholder="Añade detalles del objeto..." rows="3"></textarea>
                    </div>

                    <div class="input-group">
                        <label for="price">Valor ($)</label>
                        <input type="number" id="price" placeholder="0.00" step="0.01" required>
                    </div>

                    <button type="submit" class="btn-primary" id="submit-btn">
                        <span>Guardar en DB</span>
                        <div class="spinner hidden" id="loading-spinner"></div>
                    </button>
                    <div id="form-message" class="message hidden"></div>
                </form>
            </section>

            <section class="list-section panel">
                <div class="section-header">
                    <h2>Objetos Registrados</h2>
                    <button id="refresh-btn" class="btn-secondary">Actualizar</button>
                </div>
                <div class="table-container">
                    <table id="items-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nombre</th>
                                <th>Descripción</th>
                                <th>Valor</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="items-body">
                            <!-- Los items se insertarán aquí dinámicamente -->
                        </tbody>
                    </table>
                </div>
                <!-- Estado vacío -->
                <div id="empty-state" class="empty-state hidden">
                    <div class="empty-icon">📂</div>
                    <p>No hay objetos en la base de datos todavía.</p>
                </div>
            </section>
        </main>
        
        <footer class="footer">
            <p>Conectado a PostgreSQL via FastAPI</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
